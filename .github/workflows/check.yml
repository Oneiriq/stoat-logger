name: Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: [self-hosted, aur0]
    strategy:
      matrix:
        deno-version: [v2.x]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}
      - name: Check formatting
        run: deno task fmt:check
      - name: Lint
        run: deno task lint
      - name: Type check
        run: deno task check
